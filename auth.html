<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login & Sign Up | Auth Starter</title>
    <meta name="description" content="Clean Login and Sign Up forms with tabs, validation, and feedback." />
    <link rel="canonical" href="https://example.com/auth" />
    <link rel="stylesheet" href="css/auth.css" />
</head>

<body>
    <header class="site-header">
        <h1 class="visually-hidden">Authentication</h1>
    </header>
    <main class="auth-bg">
        <section class="auth-wrap" aria-labelledby="auth-title">
            <div class="auth-card" role="region" aria-labelledby="auth-title">
                <div class="auth-head">
                    <h2 id="auth-title" class="auth-title">Welcome</h2>
                    <p class="auth-subtitle">Login to your account or create a new one.</p>
                </div>
                <nav class="tabs" aria-label="Authentication tabs" role="tablist">
                    <button id="tab-login" class="tab is-active" role="tab" aria-selected="true"
                        aria-controls="panel-login">Login</button>
                    <button id="tab-signup" class="tab" role="tab" aria-selected="false"
                        aria-controls="panel-signup">Sign Up</button>
                </nav>

                <div class="panels">
                    <!-- Login Panel -->
                    <section id="panel-login" class="panel is-active" role="tabpanel" aria-labelledby="tab-login">
                        <form id="loginForm" novalidate>
                            <div class="field">
                                <label class="label" for="login-email">Email</label>
                                <input class="input" id="login-email" name="email" type="email"
                                    placeholder="you@example.com" required />
                            </div>

                            <div class="field">
                                <label class="label" for="login-password">Password</label>
                                <input class="input" id="login-password" name="password" type="password"
                                    placeholder="••••••••" required />
                            </div>

                            <button class="btn btn-hero" type="submit">Login</button>

                            <div class="aux">
                                <button type="button" class="link" id="forgotBtn">Forgot password?</button>
                            </div>
                        </form>
                    </section>

                    <!-- Sign Up Panel -->
                    <section id="panel-signup" class="panel" role="tabpanel" aria-labelledby="tab-signup" hidden>
                        <form id="signupForm" novalidate>
                            <div class="field">
                                <label class="label" for="signup-name">Full name</label>
                                <input class="input" id="signup-name" name="name" type="text" placeholder="Jane Doe" />
                            </div>

                            <div class="field">
                                <label class="label" for="signup-email">Email</label>
                                <input class="input" id="signup-email" name="email" type="email"
                                    placeholder="you@example.com" required />
                            </div>

                            <div class="field">
                                <label class="label" for="signup-password">Password</label>
                                <input class="input" id="signup-password" name="password" type="password"
                                    placeholder="At least 6 characters" minlength="6" required />
                            </div>

                            <div class="field">
                                <label class="label" for="signup-confirm">Confirm password</label>
                                <input class="input" id="signup-confirm" name="confirm" type="password"
                                    placeholder="Re-enter password" required />
                            </div>

                            <fieldset class="fieldset">
                                <legend id="role-legend" class="label">Role</legend>
                                <div class="radio-group" role="radiogroup" aria-labelledby="role-legend">
                                    <label class="radio-option">
                                        <input class="radio" type="radio" name="role" value="student" checked
                                            required />
                                        <span class="radio-text">Student</span>
                                    </label>
                                    <label class="radio-option">
                                        <input class="radio" type="radio" name="role" value="teacher" required />
                                        <span class="radio-text">Teacher</span>
                                    </label>
                                </div>
                            </fieldset>

                            <button class="btn btn-hero" type="submit">Sign Up</button>
                        </form>
                    </section>
                </div>

                <div id="message" class="message" aria-live="polite" role="status"></div>


            </div>
        </section>
    </main>

</body>
