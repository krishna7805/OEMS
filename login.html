<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up | Test Platform</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* General Body and Font Styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            color: #1f2937;
            transition: background-color 0.3s;
        }

        .main-container {
            width: 100%;
            max-width: 28rem;
            /* 448px */
        }

        .form-wrapper {
            background-color: #ffffff;
            border-radius: 1rem;
            /* 16px */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            /* 32px */
        }

        /* Logo and Header */
        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-container img {
            width: 10rem;
            /* 4rem */
            height: 10rem;
            border-radius: 50%;
            margin-bottom: -2.5rem;
        }

        .logo-svg {
            width: 4rem;
            /* 64px */
            height: 4rem;
            margin: 0 auto;
            color: #2563eb;
        }

        .logo-container h1 {
            font-size: 1.5rem;
            /* 24px */
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .logo-container p {
            color: #6b7280;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            background-color: #e5e7eb;
            border-radius: 9999px;
            padding: 0.25rem;
            display: flex;
            width: 100%;
            margin-bottom: 2rem;
        }

        .toggle-slider {
            position: absolute;
            background-color: #ffffff;
            height: 2rem;
            /* 40px */
            width: 50%;
            border-radius: 9999px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            transition: left 0.3s ease-in-out;
            left: 0.25rem;
            top: 0.25rem;
        }

        .toggle-btn {
            width: 50%;
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0.5rem 0;
            border-radius: 9999px;
            font-weight: 600;
            color: #6b7280;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-btn.active {
            color: #1f2937;
        }

        /* Form Containers and Transitions */
        .forms-container-wrapper {
            position: relative;
            overflow: hidden;
            min-height: 400px;
        }

        .form-container {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        }

        .form-hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            position: absolute;
            width: 100%;
        }

        .form-visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            position: relative;
        }

        /* Input Fields and Labels */
        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            /* 14px */
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.25rem;
        }

        .input-group input[type="text"],
        .input-group input[type="password"],
        .input-group input[type="email"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            /* 8px */
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
            outline: none;
        }

        /* Role Selection */
        .role-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .role-option {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-option:hover {
            background-color: #f9fafb;
        }

        .role-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .role-option input[type="radio"]:checked+span {
            font-weight: 600;
        }

        .role-option input[type="radio"]:checked~ {
            border-color: #2563eb;
            background-color: #eff6ff;
        }

        /* Links and Buttons */
        .forgot-password {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .forgot-password a,
        .back-link button {
            font-size: 0.875rem;
            font-weight: 500;
            color: #2563eb;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .forgot-password a:hover,
        .back-link button:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0.75rem 1rem;
            border: 1px solid transparent;
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            font-size: 0.875rem;
            font-weight: 500;
            color: #ffffff;
            background-color: #2563eb;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
        }

        .submit-btn:hover {
            background-color: #1d4ed8;
            transform: scale(1.02);
        }

        /* OTP Form */
        .otp-header {
            text-align: center;
        }

        .otp-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .otp-header p {
            color: #6b7280;
            margin-top: 0.5rem;
        }

        .otp-inputs-container {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        .otp-input {
            width: 40px;
            height: 50px;
            text-align: center;
            font-size: 1.25rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .otp-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
            outline: none;
        }

        .back-link {
            text-align: center;
            margin-top: 1rem;
        }

        /* Footer */
        footer {
            text-align: center;
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 1.5rem;
        }

        /* Message Box for Notifications */
        .message-box-hidden {
            display: none;
        }

        .message-box-visible {
            display: block;
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            color: #ffffff;
            font-weight: 500;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            animation: fadeInOut 4s ease-in-out;
        }

        .message-box-success {
            background-color: #10b981;
            /* Green */
        }

        .message-box-error {
            background-color: #ef4444;
            /* Red */
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                bottom: 0;
            }

            10% {
                opacity: 1;
                bottom: 2rem;
            }

            90% {
                opacity: 1;
                bottom: 2rem;
            }

            100% {
                opacity: 0;
                bottom: 0;
            }
        }
    </style>
</head>

<body>

    <div class="main-container">
        <div class="form-wrapper">

            <div class="logo-container">
                <!-- <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
                </svg> -->
                <img src="assets/OEMSLogo.png" alt="OEMS Logo">
                <h1>ExamPortal</h1>
                <p>Your gateway to success</p>
            </div>

            <div class="toggle-switch">
                <div id="toggle-slider" class="toggle-slider"></div>
                <button id="show-login" class="toggle-btn active">Log In</button>
                <button id="show-signup" class="toggle-btn">Sign Up</button>
            </div>

            <div class="forms-container-wrapper">
                <!-- Login Form -->
                <div id="login-form" class="form-container form-visible">
                    <form id="loginForm">
                        <div class="input-group">
                            <label for="login-username">Username</label>
                            <input id="login-username" name="username" type="text" required>
                        </div>

                        <div class="input-group">
                            <label for="login-password">Password</label>
                            <input id="login-password" name="password" type="password" required>
                        </div>

                        <div class="forgot-password">
                            <a href="#">Forgot Password?</a>
                        </div>

                        <div>
                            <button type="submit" class="submit-btn">Log In</button>
                        </div>
                    </form>
                </div>

                <!-- Sign Up Form -->
                <div id="signup-form" class="form-container form-hidden">
                    <form id="signupForm">
                        <div class="input-group">
                            <label for="signup-name">Full Name</label>
                            <input id="signup-name" name="name" type="text" required>
                        </div>
                        <div class="input-group">
                            <label for="signup-email">Email Address</label>
                            <input id="signup-email" name="email" type="email" required>
                        </div>
                        <div class="input-group">
                            <label for="signup-password">Password</label>
                            <input id="signup-password" name="password" type="password" required>
                        </div>
                        <div class="input-group">
                            <label>Role</label>
                            <div class="role-selection">
                                <label class="role-option">
                                    <input type="radio" name="role" value="student" class="sr-only" checked>
                                    <span>Student</span>
                                </label>
                                <label class="role-option">
                                    <input type="radio" name="role" value="teacher" class="sr-only">
                                    <span>Teacher</span>
                                </label>
                            </div>
                        </div>
                        <div>
                            <button type="submit" class="submit-btn">Create Account</button>
                        </div>
                    </form>
                </div>

                <!-- OTP Form -->
                <div id="otp-form" class="form-container form-hidden">
                    <div class="otp-header">
                        <h2>Verify Your Account</h2>
                        <p>Enter the 6-digit code sent to your email.</p>
                    </div>
                    <form id="otpForm">
                        <div id="otp-inputs" class="otp-inputs-container">
                            <input type="text" maxlength="1" class="otp-input" required>
                            <input type="text" maxlength="1" class="otp-input" required>
                            <input type="text" maxlength="1" class="otp-input" required>
                            <input type="text" maxlength="1" class="otp-input" required>
                            <input type="text" maxlength="1" class="otp-input" required>
                            <input type="text" maxlength="1" class="otp-input" required>
                        </div>
                        <div class="input-group">
                            <button type="submit" class="submit-btn">Verify OTP</button>
                        </div>
                    </form>
                    <div class="back-link">
                        <button id="back-to-signup">Back to Sign Up</button>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            © 2024 ExamPortal. All rights reserved.
        </footer>
    </div>

    <div id="message-box" class="message-box-hidden">
        <p id="message-text"></p>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
